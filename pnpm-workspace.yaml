packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  esbuild: false
  sharp: false
  unrs-resolver: false

# Named catalogs — use "catalog:<name>" in package.json (e.g. catalog:react)
# https://pnpm.io/catalogs
catalogs:
  # Shared React + type packages (@cocreate/web + @cocreate/studio)
  react:
    react: "19.2.3"
    react-dom: "19.2.3"
    "@types/react": "19.2.9"
    "@types/react-dom": "19.2.3"

  # Marketing site (Next.js) — runtime + web-only devdeps
  web:
    "@base-ui/react": "^1.1.0"
    "@cosmicjs/sdk": "^1.5.2"
    "@hookform/resolvers": "^5.2.2"
    "@react-email/components": "^1.0.12"
    "@tailwindcss/postcss": "^4.1.8"
    "@tanstack/react-query": "^5.100.10"
    "@tanstack/react-query-devtools": "^5.100.10"
    clsx: "^2.1.1"
    concurrently: "^9.2.1"
    dayjs: "^1.11.13"
    embla-carousel: "^8.6.0"
    embla-carousel-react: "^8.6.0"
    "eslint-config-next": "16.1.4"
    next: "16.1.4"
    "next-sanity": "^12.4.5"
    "next-video": "^2.2.0"
    "react-email": "^6.1.4"
    "react-hook-form": "^7.76.0"
    "react-slick": "^0.30.3"
    resend: "^6.12.3"
    "tailwind-merge": "^3.5.0"
    tailwindcss: "^4.1.8"
    zod: "^4.4.3"

  # Sanity Studio app
  studio:
    "@sanity/eslint-config-studio": "^6.0.0"
    "@sanity/vision": "^5.25.1"
    prettier: "^3.5.3"
    sanity: "^5.25.1"
    "styled-components": "^6.1.18"

  # Three.js / R3F (@cocreate/web)
  graphics:
    "@react-three/drei": "^10.7.7"
    "@react-three/fiber": "^9.5.0"
    "@types/three": "^0.182.0"
    three: "^0.182.0"

  # GSAP (@cocreate/web)
  animation:
    "@gsap/react": "^2.1.2"
    gsap: "^3.14.2"

  # NestJS API (@cocreate/api)
  api:
    "@nestjs/common": "11.1.23"
    "@nestjs/config": "4.0.3"
    "@nestjs/core": "11.1.23"
    "@nestjs/platform-express": "11.1.23"
    "@nestjs/cli": "11.0.21"
    "@nestjs/schematics": "11.0.9"
    "@prisma/client": "7.8.0"
    prisma: "7.8.0"
    reflect-metadata: "^0.2.2"
    rxjs: "^7.8.2"

  # Vercel AI SDK — contact chatbot (@cocreate/web)
  ai:
    ai: "^6.0.191"
    "@ai-sdk/react": "^3.0.193"
    "@ai-sdk/openai": "^3.0.65"

  # Monorepo + lint/test toolchain (root + app devDeps)
  tooling:
    "@eslint/eslintrc": "^3.3.1"
    "@types/node": "^20.19.0"
    eslint: "^9.28.0"
    jest: "^29.7.0"
    turbo: "^2.8.14"
    typescript: "^5.8.3"
